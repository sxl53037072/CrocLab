<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="30" y1="30" x2="98" y2="98" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="50" y1="50" x2="78" y2="78" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="128" height="128" rx="28" fill="url(#bgGrad)"/>
  <!-- Subtle inner glow -->
  <rect x="4" y="4" width="120" height="120" rx="24" fill="none" stroke="url(#accentGrad)" stroke-opacity="0.15" stroke-width="1"/>
  <!-- Left bracket < -->
  <path d="M46 38L26 64L46 90" stroke="url(#accentGrad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right bracket > -->
  <path d="M82 38L102 64L82 90" stroke="url(#accentGrad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bidirectional arrows in center (encode/decode) -->
  <path d="M56 54L68 54" stroke="url(#arrowGrad)" stroke-width="5" stroke-linecap="round"/>
  <path d="M64 50L68 54L64 58" stroke="url(#arrowGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M72 74L60 74" stroke="url(#arrowGrad)" stroke-width="5" stroke-linecap="round"/>
  <path d="M64 70L60 74L64 78" stroke="url(#arrowGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
